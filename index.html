<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小红书AI标题生成器</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1>🔥 小红书AI爆款标题生成器</h1>

<input id="x" placeholder="输入关键词" style="padding:10px; width:300px;">
<button onclick="go()" style="padding:10px 20px;">生成</button>

<pre id="res" style="margin-top:30px; white-space:pre-wrap;"></pre>

<script>
async function go() {
    const keyword = document.getElementById("x").value;

    const res = await fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            keyword: keyword
        })
    });

    const data = await res.json();

    document.getElementById("res").innerText = data.result;
}
</script>

</body>
</html>
